<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Video not available</title>
    <style>
    body {
      display: flex;
      width: 100%;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 0px;
      padding: 0px;
      margin: 0px;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #FFF;
      text-shadow: 2px 2px #000;
      background-color: #000;
      text-align: center;
    }
    </style>
  </head>
  <body>
    <h1>Video not available.</h1>
    <script>
      const l = { 'pt-br': 'Transmissão não disponível', 'pt-pt': 'Transmissão não disponível' };
      const userLanguage = navigator.language || navigator.userLanguage;
      const lowerUserLanguage = String(userLanguage).toLowerCase();
      if (lowerUserLanguage in l) {
        document.querySelector('h1').innerHTML = l[lowerUserLanguage];
        document.head.querySelector('title').innerHTML = l[lowerUserLanguage];
      }
    </script>
  </body>
</html>
